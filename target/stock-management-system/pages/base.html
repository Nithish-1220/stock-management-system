<!DOCTYPE html>
<html>

<head>
    <title>Stock Management System</title>
    <link rel="stylesheet" href="../css/base.css">
</head>

<body>

    <header class="header">
        <i class="app-icon" data-lucide="monitor-cloud"></i>
        <h1>Zoho Stock Management Software</h1>
    </header>

    <div class="container">

        <aside class="sidebar">
            <h4>Main Menu</h4>
            <ul>
                <li class="dashboard"><i class="sidebar-icon" data-lucide="layout-dashboard"></i>
                    Dashboard</li>
                <li class="shops"><i class="sidebar-icon" data-lucide="store"></i> Shops</li>
                <li class="branches"><i class="sidebar-icon" data-lucide="map-pin"></i> Branches</li>
                <li class="vendors"><i class="sidebar-icon" data-lucide="users"></i>
                    Vendors</li>
                <li class="products"><i class="sidebar-icon" data-lucide="package"></i> Products</li>
                <li class="inventory"><i class="sidebar-icon" data-lucide="archive"></i> Inventory</li>
                <li class="purchases"><i class="sidebar-icon" data-lucide="file-text"></i> Billings</li>
                <li class="sales"><i class="sidebar-icon" data-lucide="shopping-cart"></i> Orders</li>
                <li class="reports"><i class="sidebar-icon" data-lucide="bar-chart"></i> Reports &
                    Analytics</li>
            </ul>
        </aside>

        <div class="config">
            <select id="shopSelect"></select>
            <select id="branchSelect"></select>
        </div>


        <main class="content" id="content">

        </main>


    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/base.js"></script>
    <script src="../js/shop.js"></script>
    <script src="../js/vendor.js"></script>
    <script src="../js/product.js"></script>
    <script src="../js/inventory.js"></script>
    <script src="../js/purchase.js"></script>
    <script src="../js/sales.js"></script>
    <script src="../js/report.js"></script>
    <script>
      
    </script>
</body>


</html>
